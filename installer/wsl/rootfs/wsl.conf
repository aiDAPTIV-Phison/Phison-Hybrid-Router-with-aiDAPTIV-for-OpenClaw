# WSL distro boot configuration for `aidaptivclaw`.
# Reference: https://learn.microsoft.com/windows/wsl/wsl-config
#
# This file is consumed when `wsl --import` registers the rootfs (more
# precisely: when the distro next cold-boots after being terminated --
# post-install.ps1 calls `wsl --terminate aidaptivclaw` after staging,
# so the freshly-imported distro picks this up on the user's first
# launcher click).
#
# ----------------------------------------------------------------------
# Two modes, selected at install time by the "Allow OpenClaw to access
# Windows files and run Windows commands" checkbox (Inno Setup task
# `windowsbridge`):
#
#   STRICT SANDBOX -- checkbox UNCHECKED (DEFAULT, this file as shipped):
#     [automount] enabled=false
#     [interop]   enabled=false
#     [interop]   appendWindowsPath=false
#     -> No /mnt/c, no cmd.exe / powershell.exe / explorer.exe
#     -> Gateway cannot read Windows files or spawn Windows binaries
#     -> The threat-model items A.1 (LLM reads arbitrary Windows files)
#        and A.2 (LLM executes arbitrary Windows .exe) are mitigated.
#
#   PERMISSIVE -- checkbox CHECKED:
#     [automount] enabled=true
#     [interop]   enabled=true
#     [interop]   appendWindowsPath=true
#     -> Gateway CAN do "set me an alarm" (schtasks.exe), "open D:\foo
#        in Explorer" (explorer.exe), "save this to my Desktop"
#        (/mnt/c/Users/.../Desktop), clipboard read/write, Office COM
#        automation, etc.
#     -> AT THE COST OF: the gateway can read any Windows file the
#        signed-in user can read -- ~/.ssh, browser cookies on disk,
#        Documents/, Downloads/, the lot -- and can spawn arbitrary
#        Windows binaries with the user's token.
#
# post-install.ps1 (Phase 2) sed-flips the three lines below to
# `enabled=true` / `appendWindowsPath=true` IFF the user opted into
# permissive at install time. Either way, the script also prepends a
# `# MODE: ...` header line to the file so the running distro can
# self-report which mode it is in:
#
#   wsl -d aidaptivclaw -- head -1 /etc/wsl.conf
#
# To switch modes after install: re-run the installer (the windowsbridge
# checkbox re-prompts every time -- no `checkedonce` flag).
# ----------------------------------------------------------------------

[boot]
# Enable systemd as PID 1. The gateway itself runs as a foreground
# process kicked off by openclaw-launcher.cmd, but a few support units
# still want PID 1 = systemd (e.g. wsl-pro.service masking, dbus).
systemd=true

[user]
# Default user when entering the distro via "wsl -d aidaptivclaw" without -u.
default=openclaw

[automount]
# Sandbox default. Flipped to enabled=true by post-install.ps1 only if
# the user checked the windowsbridge task in the installer.
enabled=false

[interop]
# Sandbox default. Flipped to enabled=true / appendWindowsPath=true by
# post-install.ps1 only if the user checked the windowsbridge task.
enabled=false
appendWindowsPath=false

# Note: vmIdleTimeout=-1 belongs in the host-side %USERPROFILE%\.wslconfig,
# not here. The Windows installer (post-install.ps1) writes that.
