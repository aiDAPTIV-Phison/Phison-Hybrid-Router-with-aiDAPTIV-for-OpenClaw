# WSL distro boot configuration for `aidaptivclaw`.
# Reference: https://learn.microsoft.com/windows/wsl/wsl-config
#
# This file is consumed when `wsl --import` registers the rootfs.

[boot]
# Enable systemd as PID 1 so openclaw-gateway.service starts automatically
# on distro boot.
systemd=true

[user]
# Default user when entering the distro via "wsl -d aidaptivclaw" without -u.
default=openclaw

[automount]
# CRITICAL sandbox hardening: do NOT auto-mount Windows drives.
# OpenClaw inside this distro will not see /mnt/c, /mnt/d, etc.
enabled=false

[interop]
# Disable Windows interop: prevent OpenClaw from launching Windows .exe
# files via the Linux-side process tree. Combined with automount=false this
# prevents the agent from reading or executing arbitrary host files.
enabled=false
appendWindowsPath=false

# Note: vmIdleTimeout=-1 belongs in the host-side %USERPROFILE%\.wslconfig,
# not here. The Windows installer (post-install.ps1) writes that.
